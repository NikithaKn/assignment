name: Auto Tag from Sprint Branch & Update Confluence

on:
  workflow_dispatch:
    inputs:
      sprint_branch:
        description: 'Enter sprint branch (example: 26.sprint.x)'
        required: true
        type: string
      confluence_page_id:
        description: 'Enter Confluence Page ID'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate sprint branch
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads origin ${{ github.event.inputs.sprint_branch }}; then
            echo "Branch not found"
            exit 1
          fi

      - name: Checkout sprint branch
        run: |
          git checkout -B ${{ github.event.inputs.sprint_branch }} origin/${{ github.event.inputs.sprint_branch }}

      - name: Extract sprint prefix
        id: sprint
        run: |
          PREFIX=$(echo "${{ github.event.inputs.sprint_branch }}" | sed 's/\.x$//')
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT

      - name: Generate next tag
        id: tag
        run: |
          PREFIX=${{ steps.sprint.outputs.prefix }}
          LAST_TAG=$(git tag --list "${PREFIX}.*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            NEXT=0
          else
            LAST_NUM=$(echo $LAST_TAG | awk -F'.' '{print $3}')
            NEXT=$((LAST_NUM + 1))
          fi

          NEW_TAG="${PREFIX}.${NEXT}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev
        run: |
          PREFIX=${{ steps.sprint.outputs.prefix }}
          TAGS=$(git tag --list "${PREFIX}.*" --sort=-v:refname)
          PREV=$(echo "$TAGS" | sed -n '2p')
          echo "prev_tag=$PREV" >> $GITHUB_OUTPUT

      # ✅ COMMITS
      - name: Get commits
        id: commits
        run: |
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"

          if [ -z "$PREV_TAG" ]; then
            git log -20 --pretty=format:"%h|%s|%an|%ar" --no-merges > commits.txt
          else
            git log "$PREV_TAG"..HEAD --pretty=format:"%h|%s|%an|%ar" --no-merges > commits.txt
          fi

          jq -R -s -c '
            split("\n")[:-1] |
            map(split("|")) |
            map({sha: .[0], message: .[1], author: .[2], date: .[3]})
          ' commits.txt > commits.json

          echo "commits=$(cat commits.json)" >> $GITHUB_OUTPUT

      - name: Extract Jira IDs
        run: |
          grep -oiE '[A-Z]+-[0-9]+' commits.txt | sort -u > jira_ids.txt

      # ✅ JIRA + MACRO UI
      - name: Build Jira Table + Macro UI
        id: jira
        run: |
          set -e

          echo "<table><tbody>" > jira_table.html
          echo "<tr><th>Ticket</th><th>Status</th><th>Assignee</th></tr>" >> jira_table.html
          echo "[]" > jira.json

          DONE=0
          INPROGRESS=0
          TODO=0
          BLOCKED=0

          while read ticket; do
            RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$ticket")

            STATUS=$(echo "$RESPONSE" | jq -r '.fields.status.name // "Unknown"')
            ASSIGNEE=$(echo "$RESPONSE" | jq -r '.fields.assignee.displayName // "Unassigned"')
            SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary')

            LINK="$JIRA_BASE_URL/browse/$ticket"

            if [ "$STATUS" = "Done" ]; then
              COLOR="Green"; DONE=$((DONE+1))
            elif [ "$STATUS" = "In Progress" ]; then
              COLOR="Yellow"; INPROGRESS=$((INPROGRESS+1))
            elif [ "$STATUS" = "To Do" ]; then
              COLOR="Grey"; TODO=$((TODO+1))
            else
              COLOR="Red"; BLOCKED=$((BLOCKED+1))
            fi

            STATUS_MACRO="<ac:structured-macro ac:name=\"status\"><ac:parameter ac:name=\"title\">$STATUS</ac:parameter><ac:parameter ac:name=\"colour\">$COLOR</ac:parameter></ac:structured-macro>"

            echo "<tr><td><a href=\"$LINK\">$ticket</a></td><td>$STATUS_MACRO</td><td>$ASSIGNEE</td></tr>" >> jira_table.html

            jq --arg id "$ticket" --arg summary "$SUMMARY" --arg status "$STATUS" \
              '. += [{"id":$id,"summary":$summary,"status":$status}]' jira.json > tmp.json && mv tmp.json jira.json

          done < jira_ids.txt

          echo "</tbody></table>" >> jira_table.html

          # Panels
          SUMMARY_PANEL=$(cat <<EOF
          <ac:structured-macro ac:name="panel">
          <ac:parameter ac:name="title">📊 Release Summary</ac:parameter>
          <ac:rich-text-body>
          <ul>
          <li>Done: $DONE</li>
          <li>In Progress: $INPROGRESS</li>
          <li>To Do: $TODO</li>
          <li>Blocked: $BLOCKED</li>
          </ul>
          </ac:rich-text-body>
          </ac:structured-macro>
          EOF
          )

          # SAFE OUTPUTS
          {
            echo "jira_data=$(cat jira.json | jq -c .)"
            echo "summary_panel<<EOF"
            echo "$SUMMARY_PANEL"
            echo "EOF"
            echo "status_panel<<EOF"
            echo "$STATUS_PANEL"
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
      - name: Fetch Stories + Match FixVersion + Get Epic
        id: epic
        run: |
         TAG="${{ steps.tag.outputs.new_tag }}"
          BASE=$(echo "$TAG" | awk -F'.' '{print $1"."$2}')
      
          echo "Base version: $BASE"
      
          echo "[]" > release_notes.json

            while read ticket; do
              echo "Processing $ticket..."
        
              RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
                -H "Accept: application/json" \
                "$JIRA_BASE_URL/rest/api/3/issue/$ticket")
        
              TYPE=$(echo "$RESPONSE" | jq -r '.fields.issuetype.name')
      
            # ❌ Ignore defects/bugs
            if [ "$TYPE" != "Story" ]; then
              echo "Skipping $ticket (not a Story)"
              continue
            fi

            # ✅ Get Fix Versions
            FIX_VERSION=$(echo "$RESPONSE" | jq -r '.fields.fixVersions[0].name // empty')
                          echo "========== DEBUG $ticket =========="
              echo "$RESPONSE" | jq '.fields.fixVersions'
              echo "=================================="
      
            if [ -z "$FIX" ]; then
              echo "Skipping $ticket (no fixVersion)"
              continue
            fi

            FIX_BASE=$(echo "$FIX" | awk -F'.' '{print $1"."$2}')
      
            if [ "$FIX_BASE" != "$BASE" ]; then
              echo "Skipping $ticket (fixVersion mismatch)"
              continue
            fi

            # ✅ Get Epic Key (parent)
            EPIC_KEY=$(echo "$RESPONSE" | jq -r '.fields.parent.key // empty')

            if [ -z "$EPIC_KEY" ]; then
              echo "No epic for $ticket"
              continue
            fi
      
            echo "Fetching Epic: $EPIC_KEY"
      
            EPIC_RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$EPIC_KEY")
      
            EPIC_SUMMARY=$(echo "$EPIC_RESPONSE" | jq -r '.fields.summary')
            EPIC_DESC=$(echo "$EPIC_RESPONSE" | jq -r '.fields.description.content[0].content[0].text // "No description"')

              # ✅ Append to release notes JSON
              jq --arg epic "$EPIC_KEY" \
                 --arg summary "$EPIC_SUMMARY" \
                 --arg desc "$EPIC_DESC" \
                 '. += [{
                    epic: $epic,
                    summary: $summary,
                    description: $desc
                  }]' \
                 release_notes.json > tmp.json && mv tmp.json release_notes.json
        
            done < jira_ids.txt
        
            echo "release_notes=$(cat release_notes.json | jq -c .)" >> $GITHUB_OUTPUT

      # ✅ CONFLUENCE WITH MACROS
      - name: Update Confluence Page
        run: |
          PAGE_ID=${{ github.event.inputs.confluence_page_id }}
          TAG=${{ steps.tag.outputs.new_tag }}

          SUMMARY='${{ steps.jira.outputs.summary_panel }}'
          STATUS='${{ steps.jira.outputs.status_panel }}'
          TABLE=$(cat jira_table.html)

          NEW_SECTION=$(cat <<EOF
          <hr/>
          <h2>🚀 Release $TAG</h2>
          <p><b>Date:</b> $(date)</p>

          $STATUS

          $SUMMARY

          <ac:structured-macro ac:name="expand">
          <ac:parameter ac:name="title">📋 View Jira Tickets</ac:parameter>
          <ac:rich-text-body>
          $TABLE
          </ac:rich-text-body>
          </ac:structured-macro>
          EOF
           )

          RESPONSE=$(curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            "$CONFLUENCE_BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=body.storage,version")

          VERSION=$(echo "$RESPONSE" | jq -r '.version.number')
          NEW_VERSION=$((VERSION + 1))
          EXISTING=$(echo "$RESPONSE" | jq -r '.body.storage.value')

          FINAL="$NEW_SECTION $EXISTING"
          ESCAPED=$(printf '%s' "$FINAL" | jq -Rs .)

          curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            -X PUT "$CONFLUENCE_BASE_URL/wiki/rest/api/content/$PAGE_ID" \
            -H "Content-Type: application/json" \
            -d "{\"id\":\"$PAGE_ID\",\"type\":\"page\",\"title\":\"Release Notes\",\"version\":{\"number\":$NEW_VERSION},\"body\":{\"storage\":{\"value\":$ESCAPED,\"representation\":\"storage\"}}}"

      - name: Create tag
        run: |
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}
