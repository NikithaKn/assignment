name: Auto Tag from Sprint Branch & Update Confluence

on:
  workflow_dispatch:
    inputs:
      sprint_branch:
        description: 'Enter sprint branch (example: 26.sprint.x)'
        required: true
        type: string
      confluence_page_id:
        description: 'Enter Confluence Page ID'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate sprint branch
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads origin ${{ github.event.inputs.sprint_branch }}; then
            exit 1
          fi

      - name: Checkout sprint branch
        run: |
          git fetch origin
          git checkout -B ${{ github.event.inputs.sprint_branch }} origin/${{ github.event.inputs.sprint_branch }}

      - name: Extract sprint prefix
        id: sprint
        run: |
          PREFIX=$(echo "${{ github.event.inputs.sprint_branch }}" | sed 's/\.x$//')
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT

      - name: Generate next tag
        id: tag
        run: |
          PREFIX=${{ steps.sprint.outputs.prefix }}
          LAST_TAG=$(git tag --list "${PREFIX}.*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            NEXT=0
          else
            LAST_NUM=$(echo $LAST_TAG | awk -F'.' '{print $3}')
            NEXT=$((LAST_NUM + 1))
          fi

          NEW_TAG="${PREFIX}.${NEXT}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev
        run: |
          PREFIX=${{ steps.sprint.outputs.prefix }}
          TAGS=$(git tag --list "${PREFIX}.*" --sort=-v:refname)
          PREV=$(echo "$TAGS" | sed -n '2p')
          echo "prev_tag=$PREV" >> $GITHUB_OUTPUT

      # ✅ COMMITS JSON
      - name: Get commits
        id: commits
        run: |
          PREV_TAG="${{ steps.prev.outputs.prev_tag }}"

          if [ -z "$PREV_TAG" ]; then
            git log -20 --pretty=format:"%h|%s|%an|%ar" --no-merges > commits.txt
          else
            git log "$PREV_TAG"..HEAD --pretty=format:"%h|%s|%an|%ar" --no-merges > commits.txt
          fi

          jq -R -s -c '
            split("\n")[:-1] |
            map(split("|")) |
            map({
              sha: .[0],
              message: .[1],
              author: .[2],
              date: .[3]
            })
          ' commits.txt > commits.json

          echo "commits=$(cat commits.json)" >> $GITHUB_OUTPUT

      - name: Extract Jira IDs
        run: |
          grep -oiE '[A-Z]+-[0-9]+' commits.txt | sort -u > jira_ids.txt

      # ✅ JIRA JSON + HTML
      - name: Build Jira Table + JSON
        id: jira
        run: |
          echo "<table>" > jira_table.html
          echo "<tr><th>Ticket</th><th>Status</th><th>Assignee</th></tr>" >> jira_table.html

          echo "[]" > jira.json

          while read ticket; do
            RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$ticket")

            STATUS=$(echo "$RESPONSE" | jq -r '.fields.status.name')
            ASSIGNEE=$(echo "$RESPONSE" | jq -r '.fields.assignee.displayName // "Unassigned"')
            SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary')

            LINK="$JIRA_BASE_URL/browse/$ticket"

            echo "<tr>
              <td><a href=\"$LINK\">$ticket</a></td>
              <td>$STATUS</td>
              <td>$ASSIGNEE</td>
            </tr>" >> jira_table.html

            jq --arg id "$ticket" \
               --arg summary "$SUMMARY" \
               --arg status "$STATUS" \
               '. += [{"id":$id,"summary":$summary,"status":$status}]' \
               jira.json > tmp.json && mv tmp.json jira.json

          done < jira_ids.txt

          echo "</table>" >> jira_table.html
          echo "jira_data=$(cat jira.json | jq -c .)" >> $GITHUB_OUTPUT

      # ✅ DASHBOARD DATA
      - name: Create Dashboard Data
        run: |
          mkdir -p docs/data

          TAG="${{ steps.tag.outputs.new_tag }}"
          DATE=$(date +'%Y-%m-%d')
          BRANCH="${{ github.event.inputs.sprint_branch }}"

          TICKETS='${{ steps.jira.outputs.jira_data }}'
          COMMITS='${{ steps.commits.outputs.commits }}'

          COUNT=$(echo "$COMMITS" | jq length)

          NEW=$(jq -n \
            --arg tag "$TAG" \
            --arg date "$DATE" \
            --arg branch "$BRANCH" \
            --arg status "Successful" \
            --arg deployedTo "Production" \
            --argjson tickets "$TICKETS" \
            --argjson commitCount "$COUNT" \
            '{tag:$tag,date:$date,branch:$branch,status:$status,deployedTo:$deployedTo,tickets:$tickets,commitCount:$commitCount}')

          if [ -f docs/data/releases.json ]; then
            EXISTING=$(cat docs/data/releases.json)
          else
            EXISTING='{"releases":[]}'
          fi

          echo "$EXISTING" | jq --argjson new "$NEW" \
            '.releases = ([$new] + .releases)[:50]' > docs/data/releases.json

          echo "$COMMITS" > docs/data/commits.json

          echo "$TICKETS" | jq '{
            tickets: .,
            summary: {
              done: [.[] | select(.status=="Done")] | length,
              inProgress: [.[] | select(.status=="In Progress")] | length,
              toDo: [.[] | select(.status=="To Do")] | length,
              blocked: [.[] | select(.status=="Blocked")] | length
            }
          }' > docs/data/tickets.json

      # ✅ Commit dashboard data
      - name: Commit Dashboard Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/
          git commit -m "update dashboard for ${{ steps.tag.outputs.new_tag }}" || exit 0
          git push

      # ✅ Confluence (unchanged)
      - name: Update Confluence Page
        run: |
          PAGE_ID=${{ github.event.inputs.confluence_page_id }}
          TAG=${{ steps.tag.outputs.new_tag }}

          RESPONSE=$(curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            -H "Accept: application/json" \
            "$CONFLUENCE_BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=body.storage,version")

          VERSION=$(echo "$RESPONSE" | jq -r '.version.number')
          NEW_VERSION=$((VERSION + 1))

          EXISTING_CONTENT=$(echo "$RESPONSE" | jq -r '.body.storage.value')
          TABLE=$(cat jira_table.html)

          NEW_SECTION="<hr/><h2>Release $TAG</h2><p><b>Date:</b> $(date)</p>$TABLE"

          FINAL_CONTENT="$NEW_SECTION $EXISTING_CONTENT"
          ESCAPED_CONTENT=$(printf '%s' "$FINAL_CONTENT" | jq -Rs .)

          curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            -X PUT "$CONFLUENCE_BASE_URL/wiki/rest/api/content/$PAGE_ID" \
            -H "Content-Type: application/json" \
            -d "{
              \"id\": \"$PAGE_ID\",
              \"type\": \"page\",
              \"title\": \"Release Notes\",
              \"version\": {\"number\": $NEW_VERSION},
              \"body\": {\"storage\": {\"value\": $ESCAPED_CONTENT,\"representation\": \"storage\"}}
            }"

      - name: Create tag
        run: |
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}
