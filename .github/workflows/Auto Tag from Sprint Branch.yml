name: Auto Tag from Sprint Branch & Update Confluence

on:
  workflow_dispatch:
    inputs:
      sprint_branch:
        description: 'Enter sprint branch (example: 26.sprint.x)'
        required: true
        type: string
      confluence_page_id:
        description: 'Enter Confluence Page ID'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch exists
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads origin ${{ github.event.inputs.sprint_branch }}; then
            echo "❌ Branch does not exist: ${{ github.event.inputs.sprint_branch }}"
            exit 1
          fi

      - name: Checkout sprint branch
        run: |
          git checkout ${{ github.event.inputs.sprint_branch }}

      - name: Extract sprint prefix
        id: sprint
        run: |
          BRANCH=${{ github.event.inputs.sprint_branch }}
          PREFIX=$(echo $BRANCH | sed 's/\.x$//')
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "Sprint prefix: $PREFIX"

      - name: Get latest tag for sprint
        id: latest_tag
        run: |
          PREFIX=${{ steps.sprint.outputs.prefix }}

          TAG=$(git tag --list "${PREFIX}.*" --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            NEXT=0
          else
            LAST_NUM=$(echo $TAG | awk -F'.' '{print $3}')
            NEXT=$((LAST_NUM + 1))
          fi

          NEW_TAG="${PREFIX}.${NEXT}"

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $NEW_TAG"

      - name: Create tag
        run: |
          git tag ${{ steps.latest_tag.outputs.new_tag }}
          git push origin ${{ steps.latest_tag.outputs.new_tag }}

      - name: Get last tag (previous)
        id: prev_tag
        run: |
          PREFIX=${{ steps.sprint.outputs.prefix }}
          PREV=$(git tag --list "${PREFIX}.*" --sort=-v:refname | sed -n '2p')
          echo "prev_tag=$PREV" >> $GITHUB_OUTPUT

      - name: Get commits since last tag
        run: |
          if [ -z "${{ steps.prev_tag.outputs.prev_tag }}" ]; then
            git log --pretty=format:"%s" > commits.txt
          else
            git log ${{ steps.prev_tag.outputs.prev_tag }}..HEAD --pretty=format:"%s" > commits.txt
          fi

      - name: Extract Jira IDs
        run: |
          grep -oE '[A-Z]+-[0-9]+' commits.txt | sort | uniq > jira_ids.txt
       - name: Build Jira Table with Links
  run: |
    echo "<table>" > jira_table.html
    echo "<tr><th>Ticket</th><th>Status</th><th>Assignee</th></tr>" >> jira_table.html

    while read ticket; do
      RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
        -H "Accept: application/json" \
        "$JIRA_BASE_URL/rest/api/3/issue/$ticket")

      STATUS=$(echo $RESPONSE | jq -r '.fields.status.name')
      ASSIGNEE=$(echo $RESPONSE | jq -r '.fields.assignee.displayName // "Unassigned"')

      LINK="$JIRA_BASE_URL/browse/$ticket"

      echo "<tr>
        <td><a href=\"$LINK\">$ticket</a></td>
        <td>$STATUS</td>
        <td>$ASSIGNEE</td>
      </tr>" >> jira_table.html

    done < jira_ids.txt

    echo "</table>" >> jira_table.html

    - name: Update Confluence Page (SRN)
  run: |
    PAGE_ID=${{ github.event.inputs.confluence_page_id }}
    TAG=${{ steps.latest_tag.outputs.new_tag }}

    echo "Fetching page..."

    response=$(curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
      -H "Accept: application/json" \
      "$CONFLUENCE_BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=body.storage,version")

    version=$(echo "$response" | jq -r '.version.number')
    new_version=$((version + 1))

    existing_body=$(echo "$response" | jq -r '.body.storage.value')

    table=$(cat jira_table.html)

    new_entry="<h2>Release $TAG</h2>
    <p><b>Date:</b> $(date)</p>
    $table
    <hr/>"

    updated_body="$new_entry $existing_body"

    escaped_body=$(printf '%s' "$updated_body" | jq -Rs .)

    echo "Updating Confluence..."

    curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
      -X PUT "$CONFLUENCE_BASE_URL/wiki/rest/api/content/$PAGE_ID" \
      -H "Content-Type: application/json" \
      -d "{
        \"id\": \"$PAGE_ID\",
        \"type\": \"page\",
        \"title\": \"Release notes\",
        \"version\": {\"number\": $new_version},
        \"body\": {
          \"storage\": {
            \"value\": $escaped_body,
            \"representation\": \"storage\"
          }
        }
      }"
      
