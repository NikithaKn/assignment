name: Auto Tag from Sprint Branch & Update Confluence

on:
  workflow_dispatch:
    inputs:
      sprint_branch:
        required: true
        type: string
      confluence_page_id:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout sprint branch
        run: |
          git fetch origin
          git checkout -B ${{ github.event.inputs.sprint_branch }} origin/${{ github.event.inputs.sprint_branch }}

      - name: Generate tag
        id: tag
        run: |
          PREFIX=$(echo "${{ github.event.inputs.sprint_branch }}" | sed 's/\.x$//')
          LAST_TAG=$(git tag --list "${PREFIX}.*" --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            NEXT=0
          else
            LAST_NUM=$(echo $LAST_TAG | awk -F'.' '{print $3}')
            NEXT=$((LAST_NUM + 1))
          fi

          echo "new_tag=${PREFIX}.${NEXT}" >> $GITHUB_OUTPUT

      - name: Get commits
        run: |
          git log -20 --pretty=format:"%h|%s" > commits.txt

      - name: Extract Jira IDs
        run: |
          grep -oiE '[A-Z]+-[0-9]+' commits.txt | sort -u > jira_ids.txt

      # ✅ JIRA TABLE
      - name: Build Jira Table
        id: jira
        run: |
          echo "<table><tbody>" > jira_table.html
          echo "<tr><th>Ticket</th><th>Status</th></tr>" >> jira_table.html

          DONE=0

          while read ticket; do
            RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
              "$JIRA_BASE_URL/rest/api/3/issue/$ticket?fields=status")

            STATUS=$(echo "$RESPONSE" | jq -r '.fields.status.name')
            LINK="$JIRA_BASE_URL/browse/$ticket"

            if [ "$STATUS" = "Done" ]; then
              DONE=$((DONE+1))
            fi

            echo "<tr><td><a href=\"$LINK\">$ticket</a></td><td>$STATUS</td></tr>" >> jira_table.html
          done < jira_ids.txt

          echo "</tbody></table>" >> jira_table.html

          echo "done_count=$DONE" >> $GITHUB_OUTPUT

      # ✅ EPIC SUMMARY (CLEAN)
      - name: Fetch Epic Summaries
        id: epic
        run: |
          echo "[]" > release_notes.json

          while read ticket; do
            RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
              "$JIRA_BASE_URL/rest/api/3/issue/$ticket?fields=issuetype,parent")

            TYPE=$(echo "$RESPONSE" | jq -r '.fields.issuetype.name')

            if [ "$TYPE" != "Story" ]; then
              continue
            fi

            EPIC_KEY=$(echo "$RESPONSE" | jq -r '.fields.parent.key // empty')

            if [ -z "$EPIC_KEY" ]; then
              continue
            fi

            EPIC_RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
              "$JIRA_BASE_URL/rest/api/3/issue/$EPIC_KEY?fields=summary,description")

            EPIC_SUMMARY=$(echo "$EPIC_RESPONSE" | jq -r '.fields.summary')

            EPIC_DESC=$(echo "$EPIC_RESPONSE" | jq -r '
              def extract:
                if type=="object" and has("content") then
                  .content[] | extract
                elif type=="object" and has("text") then
                  .text
                else empty end;
              .fields.description | extract' | tr '\n' ' ')

            SHORT=$(echo "$EPIC_DESC" | awk '{for(i=1;i<=15 && i<=NF;i++) printf $i" ";}')

            jq --arg epic "$EPIC_KEY" --arg short "$SHORT" \
              '. += [{"epic":$epic,"short":$short}]' \
              release_notes.json > tmp.json && mv tmp.json release_notes.json

          done < jira_ids.txt

          echo "epics=$(cat release_notes.json | jq -c .)" >> $GITHUB_OUTPUT

      # ✅ CONFLUENCE
      - name: Update Confluence
        run: |
          PAGE_ID=${{ github.event.inputs.confluence_page_id }}
          TAG=${{ steps.tag.outputs.new_tag }}

          TABLE=$(cat jira_table.html)
          EPICS='${{ steps.epic.outputs.epics }}'

          EPIC_HTML=$(echo "$EPICS" | jq -r '
            "<ul>" +
            (map("<li><b>" + .epic + "</b>: " + .short + "</li>") | join("")) +
            "</ul>"
          ')

          NEW_SECTION=$(cat <<EOF
<hr/>
<h2>Release $TAG</h2>

<h3>Epic Highlights</h3>
$EPIC_HTML

$TABLE
EOF
)

          RESPONSE=$(curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            "$CONFLUENCE_BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=body.storage,version")

          VERSION=$(echo "$RESPONSE" | jq -r '.version.number')
          NEW_VERSION=$((VERSION + 1))
          EXISTING=$(echo "$RESPONSE" | jq -r '.body.storage.value')

          FINAL="$NEW_SECTION $EXISTING"
          ESCAPED=$(printf '%s' "$FINAL" | jq -Rs .)

          curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            -X PUT "$CONFLUENCE_BASE_URL/wiki/rest/api/content/$PAGE_ID" \
            -H "Content-Type: application/json" \
            -d "{\"id\":\"$PAGE_ID\",\"type\":\"page\",\"title\":\"Release Notes\",\"version\":{\"number\":$NEW_VERSION},\"body\":{\"storage\":{\"value\":$ESCAPED,\"representation\":\"storage\"}}}"

      - name: Create tag
        run: |
          git tag ${{ steps.tag.outputs.new_tag }}
          git push origin ${{ steps.tag.outputs.new_tag }}
