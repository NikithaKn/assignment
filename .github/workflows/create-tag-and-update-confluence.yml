name: Auto Tag from Sprint Branch & Update Confluence

on:
  workflow_dispatch:
    inputs:
      sprint_branch:
        description: 'Enter sprint branch (example: 26.sprint.x)'
        required: true
      confluence_page_id:
        description: 'Enter Confluence Page ID'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch exists
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads origin ${{ github.event.inputs.sprint_branch }}; then
            echo "❌ Branch does not exist: ${{ github.event.inputs.sprint_branch }}"
            exit 1
          fi

      - name: Checkout sprint branch
        run: |
          git checkout ${{ github.event.inputs.sprint_branch }}

      - name: Extract sprint prefix
        id: sprint
        run: |
          BRANCH=${{ github.event.inputs.sprint_branch }}
          PREFIX=$(echo $BRANCH | sed 's/\.x$//')
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT
          echo "Sprint prefix: $PREFIX"

      - name: Get latest tag for sprint
        id: latest_tag
        run: |
          PREFIX=${{ steps.sprint.outputs.prefix }}

          TAG=$(git tag --list "${PREFIX}.*" --sort=-v:refname | head -n 1)

          if [ -z "$TAG" ]; then
            NEXT=0
          else
            LAST_NUM=$(echo $TAG | awk -F'.' '{print $3}')
            NEXT=$((LAST_NUM + 1))
          fi

          NEW_TAG="${PREFIX}.${NEXT}"

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $NEW_TAG"

      - name: Create tag
        run: |
          git tag ${{ steps.latest_tag.outputs.new_tag }}
          git push origin ${{ steps.latest_tag.outputs.new_tag }}

      - name: Get last tag (previous)
        id: prev_tag
        run: |
          PREFIX=${{ steps.sprint.outputs.prefix }}
          PREV=$(git tag --list "${PREFIX}.*" --sort=-v:refname | sed -n '2p')
          echo "prev_tag=$PREV" >> $GITHUB_OUTPUT

      - name: Get commits since last tag
        run: |
          if [ -z "${{ steps.prev_tag.outputs.prev_tag }}" ]; then
            git log --pretty=format:"%s" > commits.txt
          else
            git log ${{ steps.prev_tag.outputs.prev_tag }}..HEAD --pretty=format:"%s" > commits.txt
          fi

      - name: Extract Jira IDs
        run: |
          grep -oE '[A-Z]+-[0-9]+' commits.txt | sort | uniq > jira_ids.txt

      - name: Build Jira Table
        run: |
          echo "|| Ticket || Summary || Status ||" > jira_table.txt

          while read ticket; do
            RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$ticket")

            SUMMARY=$(echo $RESPONSE | jq -r '.fields.summary')
            STATUS=$(echo $RESPONSE | jq -r '.fields.status.name')

            echo "| $ticket | $SUMMARY | $STATUS |" >> jira_table.txt
          done < jira_ids.txt

      - name: Debug Confluence API
        run: |
          echo "Testing..."

          curl -v -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            -H "Accept: application/json" \
            "$CONFLUENCE_BASE_URL/rest/api/content/${{ github.event.inputs.confluence_page_id }}?expand=version"

       # 🔹 Update Confluence (UNCHANGED)
      - name: Update Confluence Page
        env:
          EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          PAGE_ID: ${{ github.event.inputs.page_id }}
          TAG: ${{ steps.tagger.outputs.new_tag }}
          PRS: ${{ steps.pr_details.outputs.prs }}
          JIRA: ${{ steps.pr_details.outputs.jira }}
        run: |
          echo "Fetching page..."
          response=$(curl -s -u $EMAIL:$API_TOKEN \
            -X GET "$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=body.storage,version")
          current_version=$(echo $response | jq '.version.number')
          new_version=$((current_version + 1))
          current_body=$(echo $response | jq -r '.body.storage.value')
          new_entry="<h3>Release $TAG</h3>
          <p><b>Date:</b> $(date)</p>
          <p><b>PRs:</b><br/>$PRS</p>
          <p><b>JIRA:</b><br/>$JIRA</p>
          <hr/>"
          updated_body="$new_entry$current_body"
          escaped_body=$(echo "$updated_body" | jq -Rs .)
          echo "Updating Confluence page..."
          curl -v -u $EMAIL:$API_TOKEN \
            -X PUT "$BASE_URL/wiki/rest/api/content/$PAGE_ID" \
            -H "Content-Type: application/json" \
            -d "{
              \"id\": \"$PAGE_ID\",
              \"type\": \"page\",
              \"title\": \"Release notes\",
              \"version\": {\"number\": $new_version},
              \"body\": {
                \"storage\": {
                  \"value\": $escaped_body,
                  \"representation\": \"storage\"
                }
              }
            }"
