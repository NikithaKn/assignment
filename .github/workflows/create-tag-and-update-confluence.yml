name: Cut Tag from Sprint Branch & Update Confluence

on:
  workflow_dispatch:
    inputs:
      sprint_branch:
        description: 'Enter sprint branch (example: 26.sprint.x)'
        required: true
      tag_version:
        description: 'Enter tag version (example: v26.1)'
        required: true
      confluence_page_id:
        description: 'Enter Confluence Page ID'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch exists
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads origin ${{ github.event.inputs.sprint_branch }}; then
            echo "❌ Branch does not exist: ${{ github.event.inputs.sprint_branch }}"
            exit 1
          fi

      - name: Checkout sprint branch
        run: |
          git checkout ${{ github.event.inputs.sprint_branch }}

      - name: Get last tag on this branch
        id: last_tag
        run: |
          LAST_TAG=$(git tag --merged HEAD --sort=-v:refname | head -n 1)
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          echo "Last tag: $LAST_TAG"

      - name: Create new tag
        run: |
          git tag ${{ github.event.inputs.tag_version }}
          git push origin ${{ github.event.inputs.tag_version }}

      - name: Get commits since last tag
        run: |
          if [ -z "${{ steps.last_tag.outputs.last_tag }}" ]; then
            git log --pretty=format:"%s" > commits.txt
          else
            git log ${{ steps.last_tag.outputs.last_tag }}..HEAD --pretty=format:"%s" > commits.txt
          fi

      - name: Extract Jira IDs
        run: |
          grep -oE '[A-Z]+-[0-9]+' commits.txt | sort | uniq > jira_ids.txt

      - name: Build Jira Table
        run: |
          echo "|| Ticket || Summary || Status ||" > jira_table.txt

          while read ticket; do
            RESPONSE=$(curl -s -u $JIRA_EMAIL:$JIRA_API_TOKEN \
              -H "Accept: application/json" \
              "$JIRA_BASE_URL/rest/api/3/issue/$ticket")

            SUMMARY=$(echo $RESPONSE | jq -r '.fields.summary')
            STATUS=$(echo $RESPONSE | jq -r '.fields.status.name')

            echo "| $ticket | $SUMMARY | $STATUS |" >> jira_table.txt
          done < jira_ids.txt

      - name: Update Confluence Page
        run: |
          PAGE_ID=${{ github.event.inputs.confluence_page_id }}

          CONTENT=$(cat jira_table.txt | sed ':a;N;$!ba;s/\n/<br\/>/g')

          PAGE=$(curl -s -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            "$CONFLUENCE_BASE_URL/rest/api/content/$PAGE_ID?expand=version")

          VERSION=$(echo $PAGE | jq '.version.number')
          NEW_VERSION=$((VERSION + 1))

          curl -X PUT \
            -u $CONFLUENCE_EMAIL:$CONFLUENCE_API_TOKEN \
            -H "Content-Type: application/json" \
            -d "{
              \"id\": \"$PAGE_ID\",
              \"type\": \"page\",
              \"title\": \"Release Notes - ${{ github.event.inputs.tag_version }}\",
              \"version\": { \"number\": $NEW_VERSION },
              \"body\": {
                \"storage\": {
                  \"value\": \"$CONTENT\",
                  \"representation\": \"storage\"
                }
              }
            }" \
            "$CONFLUENCE_BASE_URL/rest/api/content/$PAGE_ID"
