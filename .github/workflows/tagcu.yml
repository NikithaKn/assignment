name: Tag + Update Confluence

on:
  pull_request:
    types: [labeled, synchronize, reopened]

  workflow_dispatch:
    inputs:
      base_branch:
        description: "Base branch to tag from"
        required: true
        default: "main"
      sprint_number:
        description: "Sprint number (e.g. 15)"
        required: true
      page_id:
        description: "Confluence Page ID"
        required: true

jobs:
  tag_on_label:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'tagcut')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch || 'main' }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 🚫 Restrict invalid branches
      - name: Validate branch
        run: |
          branch="${{ github.event.inputs.base_branch }}"

          if [[ "$branch" != "main" && "$branch" != *.x ]]; then
            echo "❌ Invalid branch: $branch"
            echo "Only 'main' or '.x' branches allowed"
            exit 1
          fi

      # 🧠 Generate sprint-based tag
      - name: Generate tag
        id: tagger
        run: |
          branch="${{ github.event.inputs.base_branch }}"
          sprint="${{ github.event.inputs.sprint_number }}"

          git fetch --tags

          if [[ "$branch" == "main" ]]; then
            # 🟢 Create base tag
            new_tag="26.$sprint.x"
          else
            # 🔴 Increment numeric tags
            latest_tag=$(git tag --list "26.$sprint.*" \
              | grep -v '\.x$' \
              | sort -V \
              | tail -n 1)

            if [ -z "$latest_tag" ]; then
              new_tag="26.$sprint.0"
            else
              last_number=${latest_tag##*.}
              next=$((last_number + 1))
              new_tag="26.$sprint.$next"
            fi
          fi

          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      # 🔹 Prevent duplicate tags
      - name: Check if tag exists
        run: |
          git rev-parse ${{ steps.tagger.outputs.new_tag }} >/dev/null 2>&1 && {
            echo "Tag already exists!"
            exit 1
          } || echo "Tag does not exist"

      # 🔹 Collect PR + JIRA details (unchanged)
      - name: Collect PR details
        id: pr_details
        run: |
          PRS=$(git log -10 --pretty=format:"%s")

          JIRA=$(echo "$PRS" | grep -oE '[A-Z]+-[0-9]+' | sort | uniq)

          echo "prs<<EOF" >> $GITHUB_OUTPUT
          echo "$PRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "jira<<EOF" >> $GITHUB_OUTPUT
          echo "$JIRA" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 🔹 Create tag
      - name: Create and push tag
        run: |
          git tag -a ${{ steps.tagger.outputs.new_tag }} -m "Release ${{ steps.tagger.outputs.new_tag }}"
          git push origin ${{ steps.tagger.outputs.new_tag }}

      # 🔹 Update Confluence (UNCHANGED)
      - name: Update Confluence Page
        env:
          EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          PAGE_ID: ${{ github.event.inputs.page_id }}
          TAG: ${{ steps.tagger.outputs.new_tag }}
          PRS: ${{ steps.pr_details.outputs.prs }}
          JIRA: ${{ steps.pr_details.outputs.jira }}
        run: |
          echo "Fetching page..."

          response=$(curl -s -u $EMAIL:$API_TOKEN \
            -X GET "$BASE_URL/wiki/rest/api/content/$PAGE_ID?expand=body.storage,version")

          current_version=$(echo $response | jq '.version.number')
          new_version=$((current_version + 1))

          current_body=$(echo $response | jq -r '.body.storage.value')

          new_entry="<h3>Release $TAG</h3>
          <p><b>Date:</b> $(date)</p>
          <p><b>PRs:</b><br/>$PRS</p>
          <p><b>JIRA:</b><br/>$JIRA</p>
          <hr/>"

          updated_body="$new_entry$current_body"

          escaped_body=$(echo "$updated_body" | jq -Rs .)

          echo "Updating Confluence page..."

          curl -v -u $EMAIL:$API_TOKEN \
            -X PUT "$BASE_URL/wiki/rest/api/content/$PAGE_ID" \
            -H "Content-Type: application/json" \
            -d "{
              \"id\": \"$PAGE_ID\",
              \"type\": \"page\",
              \"title\": \"Release notes\",
              \"version\": {\"number\": $new_version},
              \"body\": {
                \"storage\": {
                  \"value\": $escaped_body,
                  \"representation\": \"storage\"
                }
              }
            }"
