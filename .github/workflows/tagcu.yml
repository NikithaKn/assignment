name: Tag on PR Label or Manual

on:
  pull_request:
    types: [labeled, synchronize, reopened]

  workflow_dispatch:
    inputs:
      base_branch:
        description: "Base branch to tag from"
        required: true
        default: "main"

jobs:
  tag_on_label:
    # Run if:
    # 1. PR has tagcut label OR
    # 2. Manually triggered
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'tagcut')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.base_branch || github.event.pull_request.head.ref }}

      - name: Set up Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Generate tag name
        id: tagger
        run: |
          TAG_NAME="manual-${{ github.run_number }}-$(date +'%Y%m%d%H%M%S')"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag ${{ steps.tagger.outputs.tag }}
          git push origin ${{ steps.tagger.outputs.tag }}
